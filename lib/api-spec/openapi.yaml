openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HBF Online Ordering API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: menu
    description: Public menu endpoints
  - name: orders
    description: Order operations
  - name: auth
    description: Admin authentication
  - name: customers
    description: Customer authentication and account
  - name: admin-orders
    description: Admin order management
  - name: admin-menu
    description: Admin menu management
  - name: admin-customers
    description: Admin customer management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /menu:
    get:
      operationId: getMenu
      tags: [menu]
      summary: Get full menu grouped by category
      responses:
        "200":
          description: Menu data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuResponse"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/register:
    post:
      operationId: customerRegister
      tags: [customers]
      summary: Register a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegisterRequest"
      responses:
        "201":
          description: Customer registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/login:
    post:
      operationId: customerLogin
      tags: [customers]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/me/orders:
    get:
      operationId: getMyOrders
      tags: [customers]
      summary: Get current customer's orders
      security:
        - customerAuth: []
      responses:
        "200":
          description: Customer orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: adminGetOrders
      tags: [admin-orders]
      summary: Get all orders (admin)
      security:
        - adminAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}:
    get:
      operationId: adminGetOrder
      tags: [admin-orders]
      summary: Get order by ID (admin)
      security:
        - adminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin-orders]
      summary: Update order status (admin)
      security:
        - adminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers:
    get:
      operationId: adminGetCustomers
      tags: [admin-customers]
      summary: Get all customers (admin)
      security:
        - adminAuth: []
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerSummary"

  /admin/categories:
    get:
      operationId: adminGetCategories
      tags: [admin-menu]
      summary: Get all categories (admin)
      security:
        - adminAuth: []
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: adminCreateCategory
      tags: [admin-menu]
      summary: Create a category (admin)
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    put:
      operationId: adminUpdateCategory
      tags: [admin-menu]
      summary: Update a category (admin)
      security:
        - adminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: adminDeleteCategory
      tags: [admin-menu]
      summary: Delete a category (admin)
      security:
        - adminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/items:
    get:
      operationId: adminGetItems
      tags: [admin-menu]
      summary: Get all menu items (admin)
      security:
        - adminAuth: []
      responses:
        "200":
          description: Items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: adminCreateItem
      tags: [admin-menu]
      summary: Create a menu item (admin)
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /admin/items/{id}:
    put:
      operationId: adminUpdateItem
      tags: [admin-menu]
      summary: Update a menu item (admin)
      security:
        - adminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: adminDeleteItem
      tags: [admin-menu]
      summary: Delete a menu item (admin)
      security:
        - adminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  securitySchemes:
    adminAuth:
      type: http
      scheme: bearer
    customerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    OrderStatus:
      type: string
      enum:
        - NEW
        - IN_KITCHEN
        - OUT_FOR_DELIVERY
        - COMPLETED
        - CANCELLED

    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        isActive:
          type: boolean
      required:
        - _id
        - name
        - slug
        - isActive

    CategoryRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        isActive:
          type: boolean
      required:
        - name
        - slug

    MenuItem:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        category:
          type: string
        categoryName:
          type: string
        price:
          type: number
        description:
          type: string
        imageUrl:
          type: string
        isBestSeller:
          type: boolean
        isSpicy:
          type: boolean
        isActive:
          type: boolean
      required:
        - _id
        - name
        - category
        - price
        - isActive

    MenuItemRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        description:
          type: string
        imageUrl:
          type: string
        isBestSeller:
          type: boolean
        isSpicy:
          type: boolean
        isActive:
          type: boolean
      required:
        - name
        - category
        - price

    MenuCategoryGroup:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
      required:
        - _id
        - name
        - slug
        - items

    MenuResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/MenuCategoryGroup"
        bestSellers:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
      required:
        - categories
        - bestSellers

    OrderItem:
      type: object
      properties:
        itemId:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
      required:
        - itemId
        - name
        - price
        - quantity

    Order:
      type: object
      properties:
        _id:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        customerAddress:
          type: string
        area:
          type: string
        notes:
          type: string
        paymentMethod:
          type: string
        transactionId:
          type: string
        paymentScreenshot:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        total:
          type: number
        customerId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - _id
        - items
        - customerName
        - customerPhone
        - customerAddress
        - paymentMethod
        - status
        - total
        - createdAt

    CreateOrderRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        customerAddress:
          type: string
        area:
          type: string
        notes:
          type: string
        paymentMethod:
          type: string
        transactionId:
          type: string
        paymentScreenshot:
          type: string
      required:
        - items
        - customerName
        - customerPhone
        - customerAddress
        - paymentMethod

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
      required:
        - status

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    CustomerRegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
      required:
        - token
        - email

    CustomerSummary:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        orderCount:
          type: integer
        createdAt:
          type: string
      required:
        - _id
        - email
        - orderCount
        - createdAt
